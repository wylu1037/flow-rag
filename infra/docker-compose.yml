services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: flowrag
      POSTGRES_PASSWORD: flowrag
      POSTGRES_DB: flowrag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://flowrag:flowrag@postgres:5432/flowrag
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
